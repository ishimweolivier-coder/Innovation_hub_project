services:
  postgres:
    image: postgres:16-alpine
    container_name: innovation-hub-db
    environment:
      POSTGRES_DB: innovation_hub
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: olivier
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d innovation_hub"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
