spring:
  datasource:
    url: jdbc:h2:mem:innovation_hub;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
  flyway:
    enabled: false
  mail:
    host: localhost
    port: 1025

app:
  jwt:
    secret: TestSecretKeyForInnovationHubMustBeAtLeast256BitsLong!!
  mail:
    enabled: false
