<svg xmlns="http://www.w3.org/2000/svg" width="400" height="500" viewBox="0 0 400 500">
  <defs>
    <linearGradient id="flagBlue" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#00a64e"/>
      <stop offset="40%" stop-color="#fcd116"/>
      <stop offset="100%" stop-color="#1a73e8"/>
    </linearGradient>
    <linearGradient id="sunGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffd700"/>
      <stop offset="100%" stop-color="#ff8c00"/>
    </linearGradient>
    <linearGradient id="bulbGrad" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
    <linearGradient id="circuitGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fcd116"/>
      <stop offset="100%" stop-color="#ff8c00"/>
    </linearGradient>
    <linearGradient id="chartGrad" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#1a73e8"/>
      <stop offset="100%" stop-color="#00a64e"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#1a73e8" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Outer circle with Rwanda flag gradient -->
  <circle cx="200" cy="200" r="190" fill="url(#flagBlue)" opacity="0.12"/>
  <circle cx="200" cy="200" r="185" fill="none" stroke="url(#flagBlue)" stroke-width="3" opacity="0.4"/>
  <circle cx="200" cy="200" r="175" fill="#fff" filter="url(#shadow)"/>

  <!-- Golden Sun (top area) -->
  <g transform="translate(200, 90)">
    <circle cx="0" cy="0" r="22" fill="url(#sunGrad)"/>
    <g stroke="#ffd700" stroke-width="2" stroke-linecap="round">
      <line x1="0" y1="-30" x2="0" y2="-38"/>
      <line x1="0" y1="30" x2="0" y2="38"/>
      <line x1="-30" y1="0" x2="-38" y2="0"/>
      <line x1="30" y1="0" x2="38" y2="0"/>
      <line x1="-21" y1="-21" x2="-27" y2="-27"/>
      <line x1="21" y1="21" x2="27" y2="27"/>
      <line x1="-21" y1="21" x2="-27" y2="27"/>
      <line x1="21" y1="-21" x2="27" y2="-27"/>
      <line x1="-14" y1="-28" x2="-18" y2="-35"/>
      <line x1="14" y1="-28" x2="18" y2="-35"/>
      <line x1="-28" y1="-14" x2="-35" y2="-18"/>
      <line x1="28" y1="-14" x2="35" y2="-18"/>
    </g>
  </g>

  <!-- Lightbulb (AI/Innovation) -->
  <g transform="translate(155, 120)">
    <!-- Bulb body -->
    <path d="M45 0 C45 -25 25 -40 25 -55 C25 -70 35 -80 35 -90 C35 -105 20 -115 5 -115 C-10 -115 -25 -105 -25 -90 C-25 -80 -15 -70 -15 -55 C-15 -40 -35 -25 -35 0 Z" fill="url(#bulbGrad)" opacity="0.15"/>
    <path d="M45 0 C45 -25 25 -40 25 -55 C25 -70 35 -80 35 -90 C35 -105 20 -115 5 -115 C-10 -115 -25 -105 -25 -90 C-25 -80 -15 -70 -15 -55 C-15 -40 -35 -25 -35 0 Z" fill="none" stroke="url(#bulbGrad)" stroke-width="2"/>
    <!-- Bulb base -->
    <rect x="-12" y="0" width="24" height="10" rx="3" fill="url(#bulbGrad)" opacity="0.3"/>
    <rect x="-6" y="10" width="12" height="3" rx="1.5" fill="url(#bulbGrad)" opacity="0.2"/>

    <!-- Circuit lines inside bulb (AI symbol) -->
    <g stroke="url(#circuitGrad)" stroke-width="1.5" fill="none" stroke-linecap="round">
      <path d="M-15 -80 L0 -80 L0 -65 L10 -65"/>
      <path d="M15 -90 L5 -90 L5 -75 L-10 -75"/>
      <circle cx="10" cy="-65" r="2.5" fill="url(#circuitGrad)"/>
      <circle cx="-10" cy="-75" r="2.5" fill="url(#circuitGrad)"/>
      <circle cx="0" cy="-80" r="2" fill="url(#circuitGrad)"/>
    </g>

    <!-- Rwanda map shape inside bulb (simplified) -->
    <path d="M-12 -55 C-12 -55 -8 -50 -2 -48 C4 -46 10 -48 14 -45 C18 -42 20 -38 18 -34 C16 -30 12 -28 8 -30 C4 -32 0 -36 -4 -34 C-8 -32 -10 -28 -14 -30 C-18 -32 -20 -38 -18 -42 C-16 -46 -14 -50 -12 -55 Z" fill="#1a73e8" opacity="0.25"/>
  </g>

  <!-- Growth Chart with Arrow -->
  <g transform="translate(240, 150)">
    <!-- Bars -->
    <rect x="0" y="30" width="14" height="30" rx="2" fill="url(#chartGrad)" opacity="0.4"/>
    <rect x="18" y="18" width="14" height="42" rx="2" fill="url(#chartGrad)" opacity="0.6"/>
    <rect x="36" y="8" width="14" height="52" rx="2" fill="url(#chartGrad)" opacity="0.8"/>
    <!-- Arrow -->
    <g transform="translate(43, 2)">
      <line x1="0" y1="0" x2="15" y2="-15" stroke="#00a64e" stroke-width="2.5" stroke-linecap="round"/>
      <polygon points="15,-15 9,-14 13,-8" fill="#00a64e"/>
    </g>
  </g>

  <!-- Mountains (bottom) -->
  <g transform="translate(200, 265)">
    <path d="M-80 20 L-55 -15 L-30 10 L-5 -20 L25 5 L50 -10 L80 20 Z" fill="#1a73e8" opacity="0.12"/>
    <path d="M-55 -15 L-30 10 L-5 -20 L25 5 Z" fill="#1a73e8" opacity="0.08"/>
    <!-- Snow caps -->
    <path d="M-55 -15 L-50 -10 L-48 -12 Z" fill="#fff" opacity="0.4"/>
    <path d="M-5 -20 L0 -15 L2 -17 Z" fill="#fff" opacity="0.4"/>
  </g>

  <!-- Human Figures (abstract) - left side -->
  <g transform="translate(105, 205)" fill="#7c3aed" opacity="0.15">
    <circle cx="0" cy="-15" r="6"/>
    <path d="M-4 -9 L-4 10 M4 -9 L4 10 M-8 0 L8 0 M-5 10 L-8 15 M5 10 L8 15" stroke="#7c3aed" stroke-width="2" stroke-linecap="round" fill="none"/>
    <circle cx="18" cy="-12" r="5"/>
    <path d="M14 -7 L14 8 M22 -7 L22 8 M11 0 L25 0" stroke="#7c3aed" stroke-width="2" stroke-linecap="round" fill="none"/>
  </g>

  <!-- Title text -->
  <text x="200" y="320" text-anchor="middle" font-family="'Plus Jakarta Sans','Segoe UI',Arial,sans-serif" font-weight="800" font-size="32" fill="#1a1a2e" letter-spacing="1">Innovation Hub</text>
  <text x="200" y="350" text-anchor="middle" font-family="'Inter','Segoe UI',Arial,sans-serif" font-weight="600" font-size="13" fill="#7c3aed" letter-spacing="3">AI-POWERED PLATFORM</text>

  <!-- Subtitle line -->
  <line x1="120" y1="368" x2="280" y2="368" stroke="url(#flagBlue)" stroke-width="1.5" opacity="0.3"/>

  <!-- Rwanda text with sun dot -->
  <text x="200" y="398" text-anchor="middle" font-family="'Plus Jakarta Sans','Segoe UI',Arial,sans-serif" font-weight="700" font-size="22" fill="#1a73e8" letter-spacing="4">RWANDA</text>

  <!-- Small decorative dots -->
  <circle cx="160" cy="392" r="3" fill="#fcd116" opacity="0.6"/>
  <circle cx="240" cy="392" r="3" fill="#fcd116" opacity="0.6"/>
  <circle cx="200" cy="410" r="2" fill="#00a64e" opacity="0.4"/>

  <!-- Outer decorative ring -->
  <circle cx="200" cy="200" r="178" fill="none" stroke="#1a73e8" stroke-width="0.5" opacity="0.15" stroke-dasharray="4,4"/>
</svg>
